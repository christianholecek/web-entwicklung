<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Speech Recording Tool</title>
  <style>
    :root {
      --uni-yellow: #ffd500;
      --uni-black:  #000000;
      --white:      #ffffff;
      --muted:      #444444;
      --border:     #e6e6e6;
      --pill-bg:    #f7f7f7;
      --shadow:     0 10px 30px rgba(0,0,0,.08);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; background: var(--white); color: var(--uni-black);
      font-family: Inter, system-ui, Segoe UI, Roboto, Helvetica, Arial; font-size: 16px; line-height: 1.5;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
    .card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); padding: 28px; }
    .site-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); }
    .site-header h1 { margin:0; font-size:22px; }
    .uni-logo { height:40px; width:auto; border-radius:6px; }
    h2 { margin:0 0 6px; font-size:20px; }
    h3 { margin:0 0 6px; font-size:17px; }
    p { margin:0 0 10px; color:var(--muted); }
    ul { margin:6px 0 10px 20px; color:var(--muted); }
    li { margin:4px 0; }
    .muted { color:var(--muted); font-size:13px; }
    .screen { display:none; }
    .screen.active { display:block; }
    .row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    .field { flex:1; min-width:220px; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:0 20px; }
    .grid-3 { display:grid; grid-template-columns:repeat(3, 1fr); gap:0 20px; }
    @media (max-width:720px){ .grid-2, .grid-3 { grid-template-columns:1fr; } }
    label { display:block; margin:12px 0 5px; font-weight:600; font-size:14px; }
    input, select, textarea {
      width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:10px;
      font-family:inherit; font-size:15px; background:var(--white); color:var(--uni-black);
    }
    input:focus, select:focus, textarea:focus { outline:2px solid var(--uni-yellow); outline-offset:1px; }
    textarea { min-height:96px; resize:vertical; }
    input[type="checkbox"], input[type="radio"] { width:auto; margin:0; }
    button {
      padding:10px 18px; border:1px solid var(--border); border-radius:10px; font-family:inherit;
      font-size:15px; font-weight:700; cursor:pointer; background:var(--uni-yellow); color:var(--uni-black);
    }
    button:hover { opacity:.88; }
    button:active { opacity:.75; }
    button[disabled] { opacity:.45; cursor:not-allowed; }
    .btn-ghost { background:var(--pill-bg); color:var(--uni-black); font-weight:400; }
    .pill { display:inline-block; background:var(--pill-bg); border:1px solid var(--border); border-radius:999px; padding:4px 12px; font-size:13px; color:var(--muted); }
    .divider { border:none; border-top:1px solid var(--border); margin:20px 0; }
    .footnote { font-size:12px; color:var(--muted); margin-top:14px; }
    .group-grid, .task-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:16px; }
    @media (max-width:560px){ .group-grid, .task-grid { grid-template-columns:1fr; } }
    .group-card, .task-card, .q-card {
      border:1px solid var(--border); border-radius:14px; padding:20px; background:var(--pill-bg);
    }
    .group-card { border-width:2px; cursor:pointer; text-align:center; transition:border-color .15s; background:var(--white); }
    .group-card:hover { border-color:var(--uni-yellow); }
    .group-card .flag { font-size:38px; margin-bottom:10px; }
    .group-card .grp-label { font-weight:700; font-size:16px; color:var(--uni-black); }
    .group-card .grp-sub { font-size:13px; color:var(--muted); margin-top:4px; }
    .consent-box {
      max-height:320px; overflow-y:scroll; border:1px solid var(--border); border-radius:10px;
      padding:14px 16px; background:var(--pill-bg); font-size:15px; line-height:1.45;
      scrollbar-width:auto; scrollbar-color:rgba(0,0,0,.3) rgba(0,0,0,.06);
    }
    .consent-box::-webkit-scrollbar { width:10px; }
    .consent-box::-webkit-scrollbar-track { background:rgba(0,0,0,.05); border-radius:999px; }
    .consent-box::-webkit-scrollbar-thumb { background:rgba(0,0,0,.25); border-radius:999px; }
    .scroll-hint { font-size:12px; color:var(--muted); margin:6px 0 14px; display:flex; align-items:center; gap:6px; }
    .scroll-dot { width:7px; height:7px; border-radius:50%; background:var(--uni-yellow); border:1px solid var(--border); flex-shrink:0; }
    .consent-check { display:flex; align-items:flex-start; gap:10px; margin:14px 0; }
    .consent-check span { font-size:15px; color:var(--uni-black); line-height:1.4; }
    .choice-inline { display:flex; gap:14px; flex-wrap:wrap; align-items:center; margin-top:8px; }
    .choice-inline label, .checkbox-group label { display:flex; align-items:center; gap:8px; font-weight:400; margin:4px 0; }
    .checkbox-group { display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:8px; }
    @media (max-width:720px){ .checkbox-group { grid-template-columns:1fr; } }
    .hidden { display:none !important; }
    .step-badges { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
    .step-badge { display:inline-block; background:var(--pill-bg); border:1px solid var(--border); border-radius:999px; padding:6px 10px; font-size:12px; color:var(--muted); }
    .mic-row { display:flex; gap:10px; align-items:center; margin-top:6px; }
    .mic-row select { flex:1; }
    .test-box, .prime-box { margin-top:16px; background:var(--pill-bg); border:1px solid var(--border); border-radius:10px; padding:16px; }
    .test-prompt { font-size:17px; font-weight:600; margin:10px 0; color:var(--uni-black); }
    .prompt-display { font-size:38px; text-align:center; line-height:1.2; margin:20px 0 12px; word-break:break-word; color:var(--uni-black); }
    .prime-label { font-weight:700; font-size:14px; margin-bottom:8px; }
    .prime-words { display:flex; gap:8px; flex-wrap:wrap; }
    .prime-word { background:var(--white); border:1px solid var(--border); border-radius:999px; padding:5px 14px; font-weight:700; font-size:15px; }
    .overlay {
      position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(255,255,255,.82); z-index:9999;
    }
    .overlay.active { display:flex; }
    .overlay-box { background:var(--white); border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow); padding:20px 24px; display:flex; align-items:center; gap:16px; max-width:420px; }
    .spinner { width:20px; height:20px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--uni-black); animation:spin 1s linear infinite; flex-shrink:0; }
    .preview-pill { display:inline-flex; align-items:center; gap:8px; font-size:12px; padding:7px 12px; border-radius:999px; border:1px solid var(--border); background:var(--pill-bg); color:var(--uni-black); }
    .preview-pill.active { background:var(--uni-yellow); font-weight:700; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<div class="wrap">
<div class="card">
  <div class="site-header">
    <h1 id="siteTitle">Speech Recording</h1>
    <div class="row" style="margin-left:auto; justify-content:flex-end">
      <button id="btnPreviewMode" type="button" class="btn-ghost preview-pill">Preview mode: off</button>
      <img class="uni-logo" src="img/logo_uni_graz_4c.jpg" alt="University of Graz" />
    </div>
  </div>

  <div id="scr-group" class="screen active">
    <h2 id="groupTitleMain">Welcome</h2>
    <p id="groupIntro">Before we begin, please tell us which group you belong to.</p>
    <div class="group-grid">
      <div class="group-card" id="btnGroupDE">
        <div class="flag">🇦🇹</div>
        <div class="grp-label" id="groupDELabel">Native Austrian German speaker</div>
        <div class="grp-sub" id="groupDESub">Meine Muttersprache ist Deutsch</div>
      </div>
      <div class="group-card" id="btnGroupEN">
        <div class="flag">🇬🇧</div>
        <div class="grp-label" id="groupENLabel">Native English speaker</div>
        <div class="grp-sub" id="groupENSub">English is my first language</div>
      </div>
    </div>
  </div>

  <div id="scr-consent" class="screen">
    <h2 id="consentHeading"></h2>
    <div class="consent-box" id="consentBox"></div>
    <div class="scroll-hint"><span class="scroll-dot"></span><span id="scrollHintText"></span></div>
    <div class="row" style="margin-top:12px; width:100%">
      <div class="field">
        <label for="stateSel" id="stateSelLabel"></label>
        <select id="stateSel"></select>
      </div>
      <div class="field">
        <label for="citySel" id="citySelLabel"></label>
        <input id="citySel" />
      </div>
    </div>
    <div class="consent-check">
      <input type="checkbox" id="consentChk" />
      <span id="consentCheckText"></span>
    </div>
    <div class="row">
      <button id="btnConsent" disabled></button>
      <button id="btnDecline" class="btn-ghost"></button>
    </div>
    <p class="footnote" id="consentFootnote"></p>
  </div>

  <div id="scr-quest-1" class="screen">
    <div class="step-badges"><span class="step-badge" id="q1Badge1"></span><span class="step-badge" id="q1Badge2"></span></div>
    <h2 id="q1Heading"></h2>
    <div class="q-card">
      <div class="grid-2">
        <div class="field"><label for="pid" id="pidLabel"></label><input id="pid" autocomplete="off" /></div>
        <div class="field"><label for="birthYear" id="birthYearLabel"></label><input id="birthYear" type="number" min="1900" max="2100" /></div>
        <div class="field"><label for="sexSel" id="sexLabel"></label><select id="sexSel"><option value="" selected disabled></option><option value="F"></option><option value="M"></option><option value="O"></option></select></div>
        <div class="field"><label for="arrivalYear" id="arrivalYearLabel"></label><input id="arrivalYear" type="number" min="1900" max="2100" /></div>
        <div class="field"><label for="householdCount" id="householdCountLabel"></label><input id="householdCount" type="number" min="0" /></div>
      </div>
      <div class="grid-3" style="margin-top:12px">
        <div class="field"><label for="derivedAge" id="derivedAgeLabel"></label><input id="derivedAge" disabled /></div>
        <div class="field"><label for="derivedAgeMigration" id="derivedAgeMigrationLabel"></label><input id="derivedAgeMigration" disabled /></div>
        <div class="field"><label for="derivedDuration" id="derivedDurationLabel"></label><input id="derivedDuration" disabled /></div>
      </div>
    </div>
    <div class="q-card">
      <label id="livedAbroadLabel"></label>
      <div class="choice-inline">
        <label><input type="radio" name="livedAbroad" value="1"><span class="txt-yes"></span></label>
        <label><input type="radio" name="livedAbroad" value="0"><span class="txt-no"></span></label>
      </div>
      <div id="livedAbroadDetails" class="hidden">
        <div class="grid-2" style="margin-top:10px">
          <div class="field"><label for="abroadYears" id="abroadYearsLabel"></label><input id="abroadYears" type="number" min="0" step="0.5" /></div>
          <div class="field"><label for="abroadCountry" id="abroadCountryLabel"></label><input id="abroadCountry" /></div>
          <div class="field"><label for="abroadFrom" id="abroadFromLabel"></label><input id="abroadFrom" type="number" min="1900" max="2100" /></div>
          <div class="field"><label for="abroadTo" id="abroadToLabel"></label><input id="abroadTo" type="number" min="1900" max="2100" /></div>
        </div>
      </div>
    </div>
    <div class="q-card">
      <label id="prePrimaryLabel"></label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="prePrimaryLang" value="English"><span id="prePrimaryEnglish"></span></label>
        <label><input type="checkbox" name="prePrimaryLang" value="German"><span id="prePrimaryGerman"></span></label>
        <label><input type="checkbox" id="prePrimaryOtherChk" name="prePrimaryLang" value="Other"><span id="prePrimaryOtherChkText"></span></label>
      </div>
      <div id="prePrimaryOtherWrap" class="hidden" style="margin-top:10px">
        <label for="prePrimaryOther" id="prePrimaryOtherLabel"></label>
        <input id="prePrimaryOther" />
      </div>
    </div>
    <div class="row" style="margin-top:12px"><button id="btnQ1Next"></button></div>
  </div>

  <div id="scr-quest-2" class="screen">
    <div class="step-badges"><span class="step-badge" id="q2Badge1"></span><span class="step-badge" id="q2Badge2"></span></div>
    <h2 id="q2Heading"></h2>
    <div class="q-card">
      <label id="germanBeforeLabel"></label>
      <div class="choice-inline">
        <label><input type="radio" name="germanBefore" value="1"><span class="txt-yes"></span></label>
        <label><input type="radio" name="germanBefore" value="0"><span class="txt-no"></span></label>
      </div>
      <div id="germanBeforeDetails" class="hidden" style="margin-top:10px">
        <div class="grid-2">
          <div class="field"><label for="germanBeforeVariety" id="germanBeforeVarietyLabel"></label><select id="germanBeforeVariety"></select></div>
          <div class="field"><label for="germanBeforeLastYear" id="germanBeforeLastYearLabel"></label><input id="germanBeforeLastYear" type="number" min="1900" max="2100" /></div>
        </div>
      </div>
    </div>
    <div class="q-card">
      <label id="germanAustriaLabel"></label>
      <div class="choice-inline">
        <label><input type="radio" name="germanAustria" value="1"><span class="txt-yes"></span></label>
        <label><input type="radio" name="germanAustria" value="0"><span class="txt-no"></span></label>
      </div>
      <div id="germanAustriaDetails" class="hidden" style="margin-top:10px">
        <div class="grid-2">
          <div class="field"><label for="germanAustriaVariety" id="germanAustriaVarietyLabel"></label><select id="germanAustriaVariety"></select></div>
          <div class="field"><label for="germanAustriaLastYear" id="germanAustriaLastYearLabel"></label><input id="germanAustriaLastYear" type="number" min="1900" max="2100" /></div>
        </div>
      </div>
    </div>
    <div class="q-card"><h3 id="profBeforeHeading"></h3><div id="profBeforeWrap"></div></div>
    <div class="q-card"><h3 id="profNowHeading"></h3><div id="profNowWrap"></div></div>
    <div class="row" style="margin-top:12px"><button id="btnQ2Back" class="btn-ghost"></button><button id="btnQ2Next"></button></div>
  </div>

  <div id="scr-quest-3" class="screen">
    <div class="step-badges"><span class="step-badge" id="q3Badge1"></span><span class="step-badge" id="q3Badge2"></span></div>
    <h2 id="q3Heading"></h2>
    <div id="generalScalesWrap"></div>
    <div class="q-card">
      <label id="expatCommunityLabel"></label>
      <div class="choice-inline"><label><input type="radio" name="expatCommunity" value="1"><span class="txt-yes"></span></label><label><input type="radio" name="expatCommunity" value="0"><span class="txt-no"></span></label></div>
      <div id="expatDetails" class="hidden" style="margin-top:10px"><label for="expatSinceYear" id="expatSinceYearLabel"></label><input id="expatSinceYear" type="number" min="1900" max="2100" /></div>
    </div>
    <div class="q-card">
      <label id="backToUKLabel"></label>
      <div class="choice-inline"><label><input type="radio" name="backToUK" value="1"><span class="txt-yes"></span></label><label><input type="radio" name="backToUK" value="0"><span class="txt-no"></span></label></div>
      <div id="backToUKDetails" class="hidden" style="margin-top:10px"><label for="ukStayDuration" id="ukStayDurationLabel"></label><input id="ukStayDuration" /></div>
    </div>
    <div class="row" style="margin-top:12px"><button id="btnQ3Back" class="btn-ghost"></button><button id="btnQ3Next"></button></div>
  </div>

  <div id="scr-quest-4" class="screen">
    <div class="step-badges"><span class="step-badge" id="q4Badge1"></span><span class="step-badge" id="q4Badge2"></span></div>
    <h2 id="q4Heading"></h2>
    <div class="q-card">
      <label id="hhSpeakLabel"></label>
      <div class="checkbox-group">
        <label><input type="checkbox" id="hhSpeakEnglishChk"><span id="hhSpeakEnglishText"></span></label>
        <label><input type="checkbox" id="hhSpeakGermanChk"><span id="hhSpeakGermanText"></span></label>
        <label><input type="checkbox" id="hhSpeakOtherChk"><span id="hhSpeakOtherText"></span></label>
      </div>
      <div class="grid-2" style="margin-top:10px">
        <div class="field hidden" id="hhEnglishVarietyWrap"><label for="hhEnglishVariety" id="hhEnglishVarietyLabel"></label><select id="hhEnglishVariety"></select></div>
        <div class="field hidden" id="hhGermanVarietyWrap"><label for="hhGermanVariety" id="hhGermanVarietyLabel"></label><input id="hhGermanVariety" /></div>
        <div class="field hidden" id="hhOtherSpeakWrap"><label for="hhOtherSpeak" id="hhOtherSpeakLabel"></label><input id="hhOtherSpeak" /></div>
      </div>
    </div>
    <div class="q-card">
      <label for="hhYouToThem" id="hhYouToThemLabel"></label>
      <select id="hhYouToThem"></select>
      <div class="grid-2" style="margin-top:10px">
        <div class="field hidden" id="hhYouToThemOtherWrap"><label for="hhYouToThemOther" id="hhYouToThemOtherLabel"></label><input id="hhYouToThemOther" /></div>
        <div class="field hidden" id="hhYouToThemGermanWrap"><label for="hhYouToThemGermanVariety" id="hhYouToThemGermanVarietyLabel"></label><input id="hhYouToThemGermanVariety" /></div>
      </div>
    </div>
    <div class="q-card">
      <label for="hhThemToYou" id="hhThemToYouLabel"></label>
      <select id="hhThemToYou"></select>
      <div class="grid-2" style="margin-top:10px">
        <div class="field hidden" id="hhThemToYouOtherWrap"><label for="hhThemToYouOther" id="hhThemToYouOtherLabel"></label><input id="hhThemToYouOther" /></div>
        <div class="field hidden" id="hhThemToYouEnglishWrap"><label for="hhThemToYouEnglishVariety" id="hhThemToYouEnglishVarietyLabel"></label><input id="hhThemToYouEnglishVariety" /></div>
        <div class="field hidden" id="hhThemToYouGermanWrap"><label for="hhThemToYouGermanVariety" id="hhThemToYouGermanVarietyLabel"></label><input id="hhThemToYouGermanVariety" /></div>
      </div>
    </div>
    <div class="q-card">
      <label id="hasChildrenLabel"></label>
      <div class="choice-inline"><label><input type="radio" name="hasChildren" value="1"><span class="txt-yes"></span></label><label><input type="radio" name="hasChildren" value="0"><span class="txt-no"></span></label></div>
      <div id="childrenDetails" class="hidden" style="margin-top:10px">
        <div class="grid-3">
          <div class="field"><label id="childEnglishNamesLabel"></label><div class="choice-inline"><label><input type="radio" name="childEnglishNames" value="1"><span class="txt-yes"></span></label><label><input type="radio" name="childEnglishNames" value="0"><span class="txt-no"></span></label></div></div>
          <div class="field"><label id="childGermanNamesLabel"></label><div class="choice-inline"><label><input type="radio" name="childGermanNames" value="1"><span class="txt-yes"></span></label><label><input type="radio" name="childGermanNames" value="0"><span class="txt-no"></span></label></div></div>
          <div class="field"><label id="childOtherNamesLabel"></label><div class="choice-inline"><label><input type="radio" name="childOtherNames" value="1"><span class="txt-yes"></span></label><label><input type="radio" name="childOtherNames" value="0"><span class="txt-no"></span></label></div></div>
        </div>
        <div id="childOtherNamesWrap" class="hidden" style="margin-top:10px"><label for="childOtherNamesText" id="childOtherNamesTextLabel"></label><input id="childOtherNamesText" /></div>
      </div>
    </div>
    <div class="row" style="margin-top:12px"><button id="btnQ4Back" class="btn-ghost"></button><button id="btnQ4Next"></button></div>
  </div>

  <div id="scr-quest-5" class="screen">
    <div class="step-badges"><span class="step-badge" id="q5Badge1"></span><span class="step-badge" id="q5Badge2"></span></div>
    <h2 id="q5Heading"></h2>
    <div class="q-card"><label id="ukContactFreqLabel"></label><div class="choice-inline" id="ukContactFreqWrap"></div></div>
    <div class="q-card"><label for="ukContactLanguage" id="ukContactLanguageLabel"></label><select id="ukContactLanguage"></select><div id="ukContactLanguageOtherWrap" class="hidden" style="margin-top:10px"><label for="ukContactLanguageOther" id="ukContactLanguageOtherLabel"></label><input id="ukContactLanguageOther" /></div></div>
    <div class="q-card"><label for="ukContactMethod" id="ukContactMethodLabel"></label><input id="ukContactMethod" /></div>
    <div class="row" style="margin-top:12px"><button id="btnQ5Back" class="btn-ghost"></button><button id="btnQ5Next"></button></div>
  </div>

  <div id="scr-quest-6" class="screen">
    <div class="step-badges"><span class="step-badge" id="q6Badge1"></span><span class="step-badge" id="q6Badge2"></span></div>
    <h2 id="q6Heading"></h2>
    <div class="q-card"><h3 id="germanDomainsHeading"></h3><div id="germanDomainsWrap"></div></div>
    <div class="q-card"><h3 id="englishDomainsHeading"></h3><div id="englishDomainsWrap"></div></div>
    <div class="row" style="margin-top:12px"><button id="btnQ6Back" class="btn-ghost"></button><button id="btnQ6Next"></button></div>
  </div>

  <div id="scr-quest-7" class="screen">
    <div class="step-badges"><span class="step-badge" id="q7Badge1"></span><span class="step-badge" id="q7Badge2"></span></div>
    <h2 id="q7Heading"></h2>
    <div class="q-card"><label id="watchBritishTVLabel"></label><div class="choice-inline"><label><input type="radio" name="watchBritishTV" value="1"><span class="txt-yes"></span></label><label><input type="radio" name="watchBritishTV" value="0"><span class="txt-no"></span></label></div></div>
    <div class="q-card"><label id="listenBritishRadioLabel"></label><div class="choice-inline"><label><input type="radio" name="listenBritishRadio" value="1"><span class="txt-yes"></span></label><label><input type="radio" name="listenBritishRadio" value="0"><span class="txt-no"></span></label></div></div>
    <div class="q-card"><label id="readBritishMediaLabel"></label><div class="choice-inline"><label><input type="radio" name="readBritishMedia" value="1"><span class="txt-yes"></span></label><label><input type="radio" name="readBritishMedia" value="0"><span class="txt-no"></span></label></div></div>
    <div class="q-card"><label id="listenAustrianRadioLabel"></label><div class="choice-inline"><label><input type="radio" name="listenAustrianRadio" value="1"><span class="txt-yes"></span></label><label><input type="radio" name="listenAustrianRadio" value="0"><span class="txt-no"></span></label></div></div>
    <div class="q-card" id="mediaScalesWrap"></div>
